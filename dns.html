<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LearningPlatform — шаблон курса</title>
</head>
<body>
<style>
  :root {
    --bg:#eef0f3; --bg-2:#f8f9fb; --bg-3:#ffffff; --border:#d5dae2; --border-2:#c3cad4;
    --text:#18202c; --text-dim:#5a6675; --text-faint:#8a94a2;
    --accent:#9a6a12; --accent-2:#b98526; --accent-soft:rgba(154,106,18,.10);
    --danger:#b3402a; --danger-soft:rgba(179,64,42,.10); --ok:#2f7d46;
    --tone-a:#9a6b12; --tone-a-bg:rgba(154,107,18,.13);
    --tone-b:#157f73; --tone-b-bg:rgba(21,127,115,.13);
    --tone-c:#5f49b8; --tone-c-bg:rgba(95,73,184,.13);
    --tone-d:#3f8c31; --tone-d-bg:rgba(63,140,49,.13);
    --tone-e:#c0522f; --tone-e-bg:rgba(192,82,47,.13);
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,"Times New Roman",serif;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --mono:"SFMono-Regular",ui-monospace,"Cascadia Code",Consolas,"Liberation Mono",Menlo,monospace;
    --r:12px; --shadow:0 1px 2px rgba(20,28,40,.06),0 8px 24px rgba(20,28,40,.06); --maxw:1160px;
  }
  @media (prefers-color-scheme: dark) { :root {
    --bg:#0e1520; --bg-2:#16202e; --bg-3:#1c2836; --border:#2a3646; --border-2:#38485c;
    --text:#e7ecf3; --text-dim:#9fabbd; --text-faint:#6e7c8f;
    --accent:#e0b25a; --accent-2:#d4a24a; --accent-soft:rgba(224,178,90,.12);
    --danger:#ec7156; --danger-soft:rgba(236,113,86,.13); --ok:#6ec27a;
    --tone-a:#e6b957; --tone-a-bg:rgba(230,185,87,.14);
    --tone-b:#4fc2b4; --tone-b-bg:rgba(79,194,180,.14);
    --tone-c:#a591ec; --tone-c-bg:rgba(165,145,236,.15);
    --tone-d:#79cf68; --tone-d-bg:rgba(121,207,104,.14);
    --tone-e:#ec8a6b; --tone-e-bg:rgba(236,138,107,.15);
    --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.35);
  } }
  :root[data-theme="dark"] {
    --bg:#0e1520; --bg-2:#16202e; --bg-3:#1c2836; --border:#2a3646; --border-2:#38485c;
    --text:#e7ecf3; --text-dim:#9fabbd; --text-faint:#6e7c8f;
    --accent:#e0b25a; --accent-2:#d4a24a; --accent-soft:rgba(224,178,90,.12);
    --danger:#ec7156; --danger-soft:rgba(236,113,86,.13); --ok:#6ec27a;
    --tone-a:#e6b957; --tone-a-bg:rgba(230,185,87,.14); --tone-b:#4fc2b4; --tone-b-bg:rgba(79,194,180,.14);
    --tone-c:#a591ec; --tone-c-bg:rgba(165,145,236,.15); --tone-d:#79cf68; --tone-d-bg:rgba(121,207,104,.14);
    --tone-e:#ec8a6b; --tone-e-bg:rgba(236,138,107,.15);
    --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.35);
  }
  :root[data-theme="light"] {
    --bg:#eef0f3; --bg-2:#f8f9fb; --bg-3:#ffffff; --border:#d5dae2; --border-2:#c3cad4;
    --text:#18202c; --text-dim:#5a6675; --text-faint:#8a94a2;
    --accent:#9a6a12; --accent-2:#b98526; --accent-soft:rgba(154,106,18,.10);
    --danger:#b3402a; --danger-soft:rgba(179,64,42,.10); --ok:#2f7d46;
    --tone-a:#9a6b12; --tone-a-bg:rgba(154,107,18,.13); --tone-b:#157f73; --tone-b-bg:rgba(21,127,115,.13);
    --tone-c:#5f49b8; --tone-c-bg:rgba(95,73,184,.13); --tone-d:#3f8c31; --tone-d-bg:rgba(63,140,49,.13);
    --tone-e:#c0522f; --tone-e-bg:rgba(192,82,47,.13);
    --shadow:0 1px 2px rgba(20,28,40,.06),0 8px 24px rgba(20,28,40,.06);
  }

  * { box-sizing:border-box; }
  html { scroll-behavior:smooth; scroll-padding-top:74px; }
  @media (prefers-reduced-motion: reduce){ html{ scroll-behavior:auto; } }
  body { margin:0; background:var(--bg); color:var(--text); font-family:var(--sans); font-size:17px; line-height:1.6; -webkit-font-smoothing:antialiased; }
  h1,h2,h3 { font-family:var(--serif); font-weight:600; text-wrap:balance; line-height:1.15; margin:0; }
  p { margin:0 0 1em; }
  a { color:var(--accent); }
  code { font-family:var(--mono); font-size:.92em; }
  .wrap { max-width:var(--maxw); margin:0 auto; padding:0 22px; }
  .prose { max-width:66ch; }
  :focus-visible { outline:2px solid var(--accent); outline-offset:2px; border-radius:6px; }

  /* nav */
  header.nav { position:sticky; top:0; z-index:50; background:color-mix(in srgb,var(--bg) 84%,transparent); backdrop-filter:blur(12px) saturate(1.2); border-bottom:1px solid var(--border); }
  .nav-in { display:flex; align-items:center; gap:18px; height:60px; }
  .brand { display:flex; align-items:center; gap:10px; font-family:var(--serif); font-weight:600; font-size:18px; }
  .brand svg { width:24px; height:24px; color:var(--accent); flex:none; }
  .nav-links { display:flex; gap:4px; margin-left:auto; overflow-x:auto; scrollbar-width:none; }
  .nav-links::-webkit-scrollbar { display:none; }
  .nav-links a { color:var(--text-dim); text-decoration:none; font-size:14px; font-weight:500; padding:7px 11px; border-radius:8px; white-space:nowrap; transition:color .15s, background .15s; }
  .nav-links a:hover { color:var(--text); background:var(--bg-3); }
  .nav-links a.active { color:var(--accent); background:var(--accent-soft); }
  .theme-btn { flex:none; width:38px; height:38px; border-radius:9px; border:1px solid var(--border); background:var(--bg-3); color:var(--text-dim); cursor:pointer; display:grid; place-items:center; }
  .theme-btn:hover { color:var(--accent); border-color:var(--border-2); }
  .theme-btn svg { width:18px; height:18px; }
  #progress { position:absolute; left:0; bottom:-1px; height:2px; background:var(--accent); width:0; transition:width .1s linear; }

  /* hero */
  .hero { position:relative; padding:84px 0 60px; overflow:hidden; }
  .hero::before { content:""; position:absolute; inset:0; z-index:-1; background:radial-gradient(700px 380px at 78% 8%,var(--accent-soft),transparent 70%),radial-gradient(560px 320px at 8% 92%,color-mix(in srgb,var(--tone-c) 12%,transparent),transparent 72%); }
  .eyebrow { font-family:var(--mono); font-size:12.5px; letter-spacing:.22em; text-transform:uppercase; color:var(--accent); margin-bottom:18px; }
  .hero h1 { font-size:clamp(2.5rem,6.5vw,4.6rem); letter-spacing:-.02em; }
  .hero .sub { display:block; font-size:clamp(1.02rem,2.4vw,1.45rem); font-family:var(--sans); font-weight:400; color:var(--text-dim); margin-top:18px; max-width:40ch; line-height:1.45; }
  .hero-cta { display:flex; flex-wrap:wrap; gap:12px; margin-top:32px; }
  .btn { display:inline-flex; align-items:center; gap:8px; font:inherit; font-weight:600; font-size:15px; padding:12px 20px; border-radius:10px; border:1px solid transparent; cursor:pointer; text-decoration:none; transition:transform .12s, background .15s, border-color .15s; }
  .btn:active { transform:translateY(1px); }
  .btn.primary { background:var(--accent); color:#14100a; }
  .btn.primary:hover { background:var(--accent-2); }
  .btn.ghost { background:var(--bg-3); color:var(--text); border-color:var(--border); }
  .btn.ghost:hover { border-color:var(--border-2); }

  /* оглавление-путь */
  .path { border-top:1px solid var(--border); padding:26px 0 4px; }
  .path .plead { font-family:var(--mono); font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:var(--text-faint); margin-bottom:14px; }
  .path-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; }
  .path-card { text-align:left; background:var(--bg-3); border:1px solid var(--border); border-radius:10px; padding:13px 14px; cursor:pointer; text-decoration:none; color:inherit; display:flex; flex-direction:column; gap:7px; box-shadow:var(--shadow); transition:border-color .15s, transform .12s; }
  .path-card:hover { border-color:var(--accent); transform:translateY(-2px); }
  .path-card .pnum { font-family:var(--mono); font-size:11px; color:var(--accent); letter-spacing:.1em; }
  .path-card .pt { font-family:var(--serif); font-weight:600; font-size:1.02rem; line-height:1.2; }
  .path-card .pd { font-size:11.5px; color:var(--text-faint); line-height:1.4; }
  .pdots, .level-dots { display:inline-flex; gap:4px; }
  .pdots i { width:6px; height:6px; border-radius:50%; background:var(--border-2); display:block; }
  .pdots i.on { background:var(--accent); }

  /* разделители уровней */
  .level { border-top:1px solid var(--border); background:var(--bg-2); padding:42px 0 8px; }
  .level + section { border-top:none; padding-top:30px; }
  .level-meta { display:flex; align-items:center; gap:12px; margin-bottom:10px; flex-wrap:wrap; }
  .level-tag { font-family:var(--mono); font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--accent); font-weight:600; }
  .level-dots i { width:9px; height:9px; border-radius:50%; background:var(--border-2); display:block; }
  .level-dots i.on { background:var(--accent); }
  .level-diff { font-size:12px; color:var(--text-faint); font-family:var(--mono); }
  .level-title { font-family:var(--serif); font-size:clamp(1.5rem,3vw,2.05rem); margin-bottom:6px; letter-spacing:-.01em; }
  .level-desc { color:var(--text-dim); font-size:1.02rem; max-width:62ch; margin:0; }

  /* секции */
  section { padding:64px 0; border-top:1px solid var(--border); }
  .sec-label { font-family:var(--mono); font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:var(--accent); margin-bottom:12px; }
  section h2 { font-size:clamp(1.6rem,3.4vw,2.4rem); letter-spacing:-.01em; margin-bottom:8px; }
  .sec-intro { color:var(--text-dim); font-size:1.05rem; max-width:64ch; margin-bottom:30px; }

  .blocks { display:flex; flex-direction:column; gap:22px; }
  .b-prose { max-width:70ch; color:var(--text-dim); }
  .b-prose b { color:var(--text); }
  .grid { display:grid; gap:16px; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); }
  .card { background:var(--bg-3); border:1px solid var(--border); border-radius:var(--r); padding:22px; box-shadow:var(--shadow); }
  .card h3 { font-size:1.18rem; margin-bottom:8px; }
  .card p { font-size:14.5px; color:var(--text-dim); margin:0; }
  .card .ic { width:34px; height:34px; border-radius:9px; display:grid; place-items:center; margin-bottom:14px; background:var(--accent-soft); color:var(--accent); font-family:var(--serif); font-weight:600; }

  .compare { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  @media (max-width:720px){ .compare { grid-template-columns:1fr; } }
  .compare .col { border-radius:var(--r); padding:22px; border:1px solid var(--border); background:var(--bg-3); }
  .compare .bad { border-color:color-mix(in srgb,var(--danger) 34%,var(--border)); }
  .compare .good { border-color:color-mix(in srgb,var(--ok) 34%,var(--border)); }
  .compare h4 { margin:0 0 12px; font-family:var(--sans); font-size:13px; letter-spacing:.04em; text-transform:uppercase; }
  .compare .bad h4 { color:var(--danger); } .compare .good h4 { color:var(--ok); }
  .compare ul { margin:0; padding-left:18px; } .compare li { font-size:14.5px; color:var(--text-dim); margin-bottom:9px; }

  .tablewrap { overflow-x:auto; border:1px solid var(--border); border-radius:12px; }
  table { border-collapse:collapse; width:100%; min-width:520px; font-size:14px; }
  th,td { text-align:left; padding:12px 15px; border-bottom:1px solid var(--border); vertical-align:top; }
  thead th { background:var(--bg-2); font-size:12px; letter-spacing:.06em; text-transform:uppercase; color:var(--text-dim); font-weight:600; }
  tbody tr:last-child td { border-bottom:none; }
  td .note { color:var(--text-dim); font-size:13px; }

  .accordion { display:flex; flex-direction:column; gap:10px; }
  .accordion details { background:var(--bg-3); border:1px solid var(--border); border-radius:12px; box-shadow:var(--shadow); overflow:hidden; }
  .accordion summary { cursor:pointer; padding:16px 20px; font-family:var(--serif); font-size:1.1rem; font-weight:600; list-style:none; display:flex; align-items:center; gap:12px; }
  .accordion summary::-webkit-details-marker { display:none; }
  .accordion summary .chev { margin-left:auto; transition:transform .2s; color:var(--accent); flex:none; width:18px; height:18px; }
  .accordion details[open] summary .chev { transform:rotate(90deg); }
  .accordion .abody { padding:0 20px 18px; font-size:15px; color:var(--text-dim); line-height:1.6; }
  .accordion .abody b { color:var(--text); }

  .callout { background:var(--accent-soft); border:1px solid color-mix(in srgb,var(--accent) 30%,var(--border)); border-radius:var(--r); padding:20px 22px; }
  .callout h3 { font-size:1.2rem; margin-bottom:10px; }
  .callout p { font-size:14.5px; color:var(--text); margin:0; }
  .callout b { color:var(--accent); }

  .code { font-family:var(--mono); font-size:12.5px; background:#0c1119; border:1px solid #223047; border-radius:10px; padding:15px 17px; overflow-x:auto; color:#aeb9c7; line-height:1.7; white-space:pre; }

  .steps { list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:10px; }
  .steps li { display:flex; gap:12px; font-size:14.5px; color:var(--text-dim); }
  .steps li .n { font-family:var(--mono); font-weight:700; color:var(--accent); flex:none; width:22px; }
  .steps li b { color:var(--text); }

  .pill { display:inline-block; font-family:var(--mono); font-size:11px; padding:2px 9px; border-radius:999px; font-weight:600; }
  .pill.danger { background:var(--danger-soft); color:var(--danger); border:1px solid color-mix(in srgb,var(--danger) 35%,transparent); }

  /* симулятор */
  .sim { background:var(--bg-2); border:1px solid var(--border); border-radius:16px; padding:20px; box-shadow:var(--shadow); }
  .actors { display:grid; gap:12px; margin-bottom:16px; }
  .actor { background:var(--bg-3); border:1px solid var(--border); border-radius:12px; padding:14px; transition:border-color .25s, box-shadow .25s; }
  .actor.hot { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
  .actor .aname { font-family:var(--serif); font-size:1.05rem; font-weight:600; }
  .actor .arole { font-family:var(--mono); font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--text-faint); margin-top:2px; }
  .flowmap { position:relative; height:66px; margin:2px 0 16px; }
  .flowmap svg { width:100%; height:100%; overflow:visible; }
  .flowmap .lane { stroke:var(--border-2); stroke-width:2; }
  .flowmap .msgline { stroke:var(--accent); stroke-width:2.5; stroke-linecap:round; }
  .flowmap .node { fill:var(--bg-3); stroke:var(--border-2); stroke-width:2; }
  .flowmap .node.hot { stroke:var(--accent); }
  .flowmap .nlabel { fill:var(--text-dim); font-family:var(--mono); font-size:10px; font-weight:600; }
  .flowmap .dot { fill:var(--accent); filter:drop-shadow(0 0 5px var(--accent)); }
  .flowmap .arrow { fill:var(--accent); }
  .stepbar { display:flex; align-items:center; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
  .steps-dots { display:flex; gap:6px; margin:0 auto; flex-wrap:wrap; }
  .sdot { width:30px; height:30px; border-radius:8px; border:1px solid var(--border); background:var(--bg-3); color:var(--text-dim); font-family:var(--mono); font-size:13px; font-weight:600; cursor:pointer; transition:all .15s; }
  .sdot:hover { border-color:var(--border-2); color:var(--text); }
  .sdot.active { background:var(--accent); border-color:var(--accent); color:#14100a; }
  .sdot.done { color:var(--accent); border-color:color-mix(in srgb,var(--accent) 45%,var(--border)); }
  .navbtn { width:40px; height:40px; border-radius:10px; border:1px solid var(--border); background:var(--bg-3); color:var(--text); cursor:pointer; display:grid; place-items:center; transition:all .15s; }
  .navbtn:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); }
  .navbtn:disabled { opacity:.35; cursor:default; }
  .navbtn svg { width:18px; height:18px; }
  .detail { display:grid; grid-template-columns:1.25fr 1fr; gap:16px; }
  @media (max-width:760px){ .detail { grid-template-columns:1fr; } }
  .dpanel { background:var(--bg-3); border:1px solid var(--border); border-radius:12px; padding:18px; }
  .dhead { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; margin-bottom:4px; }
  .dhead .msgname { font-family:var(--mono); font-weight:700; font-size:15px; color:var(--accent); }
  .dhead .dir { font-size:13px; color:var(--text-dim); font-weight:600; }
  .dpanel h3 { font-size:1.3rem; margin:6px 0 10px; }
  .dpanel .what { font-size:15px; color:var(--text-dim); }
  .dpanel .result { margin-top:14px; padding:12px 14px; border-radius:10px; background:var(--accent-soft); border:1px solid color-mix(in srgb,var(--accent) 26%,transparent); font-size:14px; }
  .dpanel .result b { color:var(--accent); }
  .envelope { background:var(--bg-2); border:1px solid var(--border); border-radius:12px; padding:16px; }
  .envelope .etitle { font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--text-faint); margin-bottom:12px; }
  .field { border:1px solid var(--border-2); border-radius:9px; padding:10px 12px; margin-bottom:9px; }
  .field:last-child { margin-bottom:0; }
  .field .frow { display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .field .flabel { font-family:var(--mono); font-size:13px; font-weight:600; }
  .field .fbody { font-size:12.5px; color:var(--text-dim); margin-top:6px; line-height:1.45; }
  .badge { font-family:var(--mono); font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:999px; border:1px solid; white-space:nowrap; }
  .tone-a { color:var(--tone-a); background:var(--tone-a-bg); border-color:color-mix(in srgb,var(--tone-a) 40%,transparent); }
  .tone-b { color:var(--tone-b); background:var(--tone-b-bg); border-color:color-mix(in srgb,var(--tone-b) 40%,transparent); }
  .tone-c { color:var(--tone-c); background:var(--tone-c-bg); border-color:color-mix(in srgb,var(--tone-c) 40%,transparent); }
  .tone-d { color:var(--tone-d); background:var(--tone-d-bg); border-color:color-mix(in srgb,var(--tone-d) 40%,transparent); }
  .tone-e { color:var(--tone-e); background:var(--tone-e-bg); border-color:color-mix(in srgb,var(--tone-e) 40%,transparent); }
  .field.enc.tone-a { background:var(--tone-a-bg); border-color:color-mix(in srgb,var(--tone-a) 45%,transparent); }
  .field.enc.tone-b { background:var(--tone-b-bg); border-color:color-mix(in srgb,var(--tone-b) 45%,transparent); }
  .field.enc.tone-c { background:var(--tone-c-bg); border-color:color-mix(in srgb,var(--tone-c) 45%,transparent); }
  .field.enc.tone-d { background:var(--tone-d-bg); border-color:color-mix(in srgb,var(--tone-d) 45%,transparent); }
  .field.enc.tone-e { background:var(--tone-e-bg); border-color:color-mix(in srgb,var(--tone-e) 45%,transparent); }

  /* квиз */
  .quiz { display:grid; gap:16px; }
  .q { background:var(--bg-3); border:1px solid var(--border); border-radius:12px; padding:20px; box-shadow:var(--shadow); }
  .q .qn { font-family:var(--mono); font-size:12px; color:var(--accent); letter-spacing:.1em; }
  .q .qq { font-weight:600; font-size:1.05rem; margin-bottom:4px; }
  .opts { display:grid; gap:8px; margin-top:14px; }
  .opt { text-align:left; font:inherit; font-size:14.5px; padding:12px 14px; border-radius:10px; border:1px solid var(--border); background:var(--bg-2); color:var(--text); cursor:pointer; display:flex; align-items:center; gap:11px; transition:border-color .15s, background .15s; }
  .opt:hover:not(:disabled) { border-color:var(--border-2); }
  .opt .mark { width:22px; height:22px; border-radius:50%; border:1.5px solid var(--border-2); flex:none; display:grid; place-items:center; font-size:13px; }
  .opt.correct { border-color:var(--ok); background:color-mix(in srgb,var(--ok) 12%,var(--bg-2)); }
  .opt.correct .mark { border-color:var(--ok); background:var(--ok); color:#fff; }
  .opt.wrong { border-color:var(--danger); background:color-mix(in srgb,var(--danger) 12%,var(--bg-2)); }
  .opt.wrong .mark { border-color:var(--danger); background:var(--danger); color:#fff; }
  .opt:disabled { cursor:default; }

      "www.example.com":  { CNAME:["example.com."] },

    },
    rr: function (name, type, val) { var n = name.replace(/\.$/, "") + "."; return { line: n + "\t3600\tIN\t" + type + "\t" + val, val: val }; },
    resolve: function (name, type) {
      var z = this.zone, rec = z[name], ans = [], self = this;
      if (rec && rec.CNAME && (type === "A" || type === "AAAA")) {
        ans.push(this.rr(name, "CNAME", rec.CNAME[0]));
        var tgt = rec.CNAME[0].replace(/\.$/, ""), t2 = z[tgt];
        if (t2 && t2[type]) t2[type].forEach(function (v) { ans.push(self.rr(tgt, type, v)); });
      } else if (rec && rec[type]) {
        rec[type].forEach(function (v) { ans.push(self.rr(name, type, v)); });
      }
      return ans;
    },
    digFull: function (name, type, ans) {
      var s = "; <<>> DiG 9.18.1 <<>> " + name + (type !== "A" ? " " + type : "") + "\n";
      s += ";; global options: +cmd\n;; Got answer:\n";
      s += ";; ->>HEADER<<- opcode: QUERY, status: " + (ans.length ? "NOERROR" : "NXDOMAIN") + ", id: " + (10000 + Math.floor(Math.random() * 50000)) + "\n";
      s += ";; flags: qr rd ra; QUERY: 1, ANSWER: " + ans.length + "\n\n";
      s += ";; QUESTION SECTION:\n;" + name + ".\t\tIN\t" + type + "\n";
      if (ans.length) s += "\n;; ANSWER SECTION:\n" + ans.map(function (a) { return a.line; }).join("\n") + "\n";
      s += "\n;; Query time: " + (8 + Math.floor(Math.random() * 40)) + " msec\n;; SERVER: 8.8.8.8#53(8.8.8.8)";
      return s;
    },
    traceText: function (name) {
      return "; <<>> DiG 9.18.1 <<>> +trace " + name + "\n\n" +
        ".\t\t518400\tIN\tNS\ta.root-servers.net.\n;; получено от 198.41.0.4 (корневой сервер)\n\n" +
        "com.\t\t172800\tIN\tNS\ta.gtld-servers.net.\n;; получено от a.root-servers.net (сервер TLD .com)\n\n" +
        "example.com.\t172800\tIN\tNS\tns1.example.com.\n;; получено от a.gtld-servers.net (делегирование зоны)\n\n" +
        "www.example.com.\t3600\tIN\tCNAME\texample.com.\nexample.com.\t3600\tIN\tA\t93.184.216.34\n;; получено от ns1.example.com (авторитетный ответ)";
    },
    commands: [
      { name: "dig", run: function (args, ctx) {
        var T = ctx.cfg;
        var flags = args.filter(function (a) { return a.charAt(0) === "+"; }).map(function (a) { return a.toLowerCase(); });
        var pos = args.filter(function (a) { return a.charAt(0) !== "+"; });
        var name = (pos[0] || "").replace(/\.$/, ""), type = (pos[1] || "A").toUpperCase();
        if (!name) { ctx.error("dig: укажите имя, например: dig example.com"); return; }
        if (flags.indexOf("+trace") >= 0) { ctx.out(T.traceText(name)); ctx.note("Тот же путь, что в симуляторе: корень → .com → авторитетный сервер зоны."); ctx.complete("trace"); return; }
        var ans = T.resolve(name, type);
        if (flags.indexOf("+short") >= 0) {
          if (!ans.length) { ctx.muted(";; нет записи " + type + " для " + name); return; }
          ctx.out(ans.map(function (a) { return a.val; }).join("\n")); ctx.complete("short"); return;
        }
        ctx.out(T.digFull(name, type, ans));
        if (ans.length) {
          ctx.note("Резолвер обошёл иерархию и вернул запись " + type + ". Полный путь — в «dig +trace».");
          if (type === "A") ctx.complete("a");
          if (type === "MX") ctx.complete("mx");
          if (type === "NS") ctx.complete("ns");
        }
      } },
      { name: "nslookup", run: function (args, ctx) {
        var z = ctx.cfg.zone, name = (args[0] || "").replace(/\.$/, "");
        if (!name) { ctx.error("nslookup: укажите имя"); return; }
        var out = "Server:\t\t8.8.8.8\nAddress:\t8.8.8.8#53\n\n", rec = z[name], a = rec && rec.A;
        if (rec && rec.CNAME) { out += name + "\tcanonical name = " + rec.CNAME[0] + "\n"; var t = z[rec.CNAME[0].replace(/\.$/, "")]; a = t && t.A; name = rec.CNAME[0].replace(/\.$/, ""); }
        if (a) { ctx.out(out + "Name:\t" + name + "\nAddress: " + a[0]); ctx.complete("a"); }
        else { ctx.out(out + "** server can't find " + name + ": NXDOMAIN"); }
      } },
      { name: "host", run: function (args, ctx) {
        var z = ctx.cfg.zone, name = (args[0] || "").replace(/\.$/, "");
        if (!name) { ctx.error("host: укажите имя"); return; }
        var rec = z[name];
        if (rec && rec.CNAME) { ctx.out(name + " is an alias for " + rec.CNAME[0]); var t = z[rec.CNAME[0].replace(/\.$/, "")]; if (t && t.A) ctx.out(rec.CNAME[0].replace(/\.$/, "") + " has address " + t.A[0]); ctx.complete("a"); return; }
        if (rec && rec.A) { rec.A.forEach(function (v) { ctx.out(name + " has address " + v); }); if (rec.MX) rec.MX.forEach(function (v) { ctx.out(name + " mail is handled by " + v); }); ctx.complete("a"); return; }
        ctx.out("Host " + name + " not found: 3(NXDOMAIN)");
      } },
      { name: "help", run: function (args, ctx) { ctx.out(ctx.helpText); } },
      { name: "clear", run: function (args, ctx) { ctx.clear(); } }
    ]
  }

          '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></a>' +
        (hasType("exam") ? '<a href="#exam" class="btn ghost">Сразу к экзамену</a>' : '') +

  function hasType(t) { return C.sections.some(function (s) { return s.type === t; }); }

  /* path */
  var pathHTML = '<div class="path"><div class="wrap"><div class="plead">Маршрут курса</div><div class="path-grid">' +
    C.levels.map(function (l) {

  /* sections */

  function sectionHead(s) {

  function renderSection(s) {
    if (s.type === "simulator") return '<section id="' + s.id + '"><div class="wrap">' + sectionHead(s) + simMarkup() + '</div></section>';
    if (s.type === "quiz")      return '<section id="' + s.id + '"><div class="wrap">' + sectionHead(s) + '<div class="quiz" id="quizWrap"></div><div class="quizscore" id="quizScore"></div></div></section>';
    if (s.type === "flashcards")return '<section id="' + s.id + '"><div class="wrap">' + sectionHead(s) + deckMarkup() + '</div></section>';
    if (s.type === "exam")      return '<section id="' + s.id + '"><div class="wrap">' + sectionHead(s) + examMarkup() + '</div></section>';

    return '<section id="' + s.id + '"><div class="wrap">' + sectionHead(s) + '<div class="blocks">' + (s.blocks || []).map(renderBlock).join("") + '</div></div></section>';

  function renderBlock(b) {
    if (b.t === "prose")   return '<div class="b-prose">' + b.html + '</div>';
    if (b.t === "cards")   return '<div class="grid">' + b.items.map(function (c) {
      return '<div class="card">' + (c.ic ? '<div class="ic">' + esc(c.ic) + '</div>' : "") + '<h3>' + esc(c.title) + '</h3><p>' + c.body + '</p></div>';
    }).join("") + '</div>';
    if (b.t === "compare") {
      var col = function (o, cls) { return '<div class="col ' + cls + '"><h4>' + esc(o.title) + '</h4><ul>' + o.items.map(function (i) { return '<li>' + i + '</li>'; }).join("") + '</ul></div>'; };

    }
    if (b.t === "table")   return '<div class="tablewrap"><table><thead><tr>' + b.head.map(function (h) { return '<th>' + esc(h) + '</th>'; }).join("") +

  /* ---------- СИМУЛЯТОР ---------- */
  function simMarkup() {
    return '<div class="sim"><div class="actors" id="simActors"></div>' +
      '<div class="flowmap"><svg id="simSvg" viewBox="0 0 600 66" preserveAspectRatio="xMidYMid meet" aria-hidden="true"></svg></div>' +
      '<div class="stepbar"><button class="navbtn" id="simPrev" aria-label="Назад"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg></button>' +
      '<div class="steps-dots" id="simDots"></div>' +
      '<button class="navbtn" id="simNext" aria-label="Вперёд"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></button></div>' +
      '<div class="detail"><div class="dpanel" id="simPanel"></div><div class="envelope" id="simEnv"></div></div></div>';
  }
  function initSim() {
    var sim = C.simulator; if (!sim || !document.getElementById("simActors")) return;
    var actors = sim.actors, steps = sim.steps, N = actors.length, idx = {};
    actors.forEach(function (a, i) { idx[a.id] = i; });
    var actorsEl = document.getElementById("simActors");
    actorsEl.style.gridTemplateColumns = "repeat(" + N + ", 1fr)";
    if (window.matchMedia("(max-width:760px)").matches) actorsEl.style.gridTemplateColumns = "1fr";
    actorsEl.innerHTML = actors.map(function (a) {
      return '<div class="actor" data-a="' + a.id + '"><div class="aname">' + esc(a.name) + '</div><div class="arole">' + esc(a.role || "") + '</div></div>';
    }).join("");

    var svg = document.getElementById("simSvg"), NY = 24;
    function nodeX(i) { return N < 2 ? 300 : 40 + i * (520 / (N - 1)); }
    function buildMap() {
      var s = '<line class="lane" x1="' + nodeX(0) + '" y1="' + NY + '" x2="' + nodeX(N - 1) + '" y2="' + NY + '"/>';
      actors.forEach(function (a, i) {
        s += '<circle class="node" data-node="' + a.id + '" cx="' + nodeX(i) + '" cy="' + NY + '" r="8"/>';
        s += '<text class="nlabel" x="' + nodeX(i) + '" y="' + (NY + 28) + '" text-anchor="middle">' + esc(a.name) + '</text>';
      });
      s += '<line class="msgline" id="simMsg" x1="0" y1="' + NY + '" x2="0" y2="' + NY + '" style="opacity:0"/>';
      s += '<polygon class="arrow" id="simArr" points="0,0 0,0 0,0" style="opacity:0"/>';
      s += '<circle class="dot" id="simDotM" cx="0" cy="' + NY + '" r="5" style="opacity:0"/>';
      svg.innerHTML = s;
    }
    buildMap();

    var dotsEl = document.getElementById("simDots");
    dotsEl.innerHTML = steps.map(function (st, i) { return '<button class="sdot" data-i="' + i + '" aria-label="Шаг ' + (i + 1) + '">' + (i + 1) + '</button>'; }).join("");
    var panel = document.getElementById("simPanel"), env = document.getElementById("simEnv");
    var prev = document.getElementById("simPrev"), next = document.getElementById("simNext");
    var anim = null, cur = 0;

    function animate(st) {
      var fi = idx[st.from], ti = idx[st.to], fx = nodeX(fi), tx = nodeX(ti), dir = tx > fx ? 1 : -1;
      var line = document.getElementById("simMsg"), arr = document.getElementById("simArr"), dot = document.getElementById("simDotM");
      line.setAttribute("x1", fx); line.setAttribute("x2", tx); line.style.opacity = "1";
      var ax = tx - dir * 11, w = 7;
      arr.setAttribute("points", (dir > 0 ? [ax, NY, ax - w, NY - 5, ax - w, NY + 5] : [ax, NY, ax + w, NY + 5, ax + w, NY - 5]).join(" "));
      arr.style.opacity = "1";
      svg.querySelectorAll(".node").forEach(function (n) { n.classList.toggle("hot", n.getAttribute("data-node") === st.from || n.getAttribute("data-node") === st.to); });
      if (anim) { clearInterval(anim); anim = null; }
      if (reduce) { dot.style.opacity = "0"; return; }
      dot.style.opacity = "1"; var t = 0;
      anim = setInterval(function () { t += 0.045; if (t >= 1) { t = 1; clearInterval(anim); anim = null; dot.style.opacity = "0"; } dot.setAttribute("cx", fx + (tx - fx) * t); }, 16);
    }
    function render() {
      var st = steps[cur];
      panel.innerHTML = '<div class="dhead"><span class="msgname">' + (cur + 1) + ' · ' + esc(st.name) + '</span><span class="dir">' + esc(st.dir || "") + '</span></div>' +
        '<h3>' + esc(st.title) + '</h3><div class="what">' + st.what + '</div>' + (st.result ? '<div class="result">' + st.result + '</div>' : "");
      env.innerHTML = '<div class="etitle">Содержимое: ' + esc(st.name) + '</div>' + (st.fields || []).map(function (f) {
        var tone = f.tone ? " enc tone-" + f.tone : "";
        var badge = f.badge ? '<span class="badge ' + (f.tone ? "tone-" + f.tone : "") + '">' + esc(f.badge) + '</span>' : "";
        return '<div class="field' + tone + '"><div class="frow"><span class="flabel">' + esc(f.label) + '</span>' + badge + '</div><div class="fbody">' + f.body + '</div></div>';
      }).join("");
      actorsEl.querySelectorAll(".actor").forEach(function (el) { el.classList.toggle("hot", el.getAttribute("data-a") === st.from || el.getAttribute("data-a") === st.to); });
      dotsEl.querySelectorAll(".sdot").forEach(function (d, i) { d.classList.toggle("active", i === cur); d.classList.toggle("done", i < cur); });
      prev.disabled = cur === 0; next.disabled = cur === steps.length - 1;
      animate(st);
    }
    function go(i) { cur = Math.max(0, Math.min(steps.length - 1, i)); render(); }
    prev.addEventListener("click", function () { go(cur - 1); });
    next.addEventListener("click", function () { go(cur + 1); });
    dotsEl.addEventListener("click", function (e) { var b = e.target.closest(".sdot"); if (b) go(+b.getAttribute("data-i")); });
    document.getElementById("sim").addEventListener("keydown", function (e) { if (e.key === "ArrowRight") go(cur + 1); if (e.key === "ArrowLeft") go(cur - 1); });
    render();
  }

  /* ---------- КВИЗ ---------- */
  function initQuiz() {
    var wrap = document.getElementById("quizWrap"); if (!wrap || !C.quiz) return;
    var scoreEl = document.getElementById("quizScore"), answered = 0, correct = 0, total = C.quiz.length;
    wrap.innerHTML = C.quiz.map(function (q, qi) {
      var opts = q.opts.map(function (o, oi) { return '<button class="opt" data-q="' + qi + '" data-o="' + oi + '"><span class="mark">' + String.fromCharCode(65 + oi) + '</span><span>' + esc(o) + '</span></button>'; }).join("");
      return '<div class="q"><div class="qn">Вопрос ' + (qi + 1) + '</div><div class="qq">' + esc(q.q) + '</div><div class="opts">' + opts + '</div><div class="explain" id="qex' + qi + '"></div></div>';
    }).join("");
    scoreEl.innerHTML = "Отвечено: <b>0</b> из " + total + " · Верно: <b>0</b>";
    wrap.addEventListener("click", function (e) {
      var b = e.target.closest(".opt"); if (!b) return;
      var qi = +b.getAttribute("data-q"), oi = +b.getAttribute("data-o"), q = C.quiz[qi], box = b.closest(".q");
      if (box.dataset.done) return; box.dataset.done = "1"; answered++;
      var right = oi === q.a; if (right) correct++;
      box.querySelectorAll(".opt").forEach(function (btn) { var i = +btn.getAttribute("data-o"); btn.disabled = true; if (i === q.a) btn.classList.add("correct"); else if (i === oi) btn.classList.add("wrong"); });
      var ex = document.getElementById("qex" + qi);
      ex.innerHTML = (right ? "<b style='color:var(--ok)'>Верно. </b>" : "<b style='color:var(--danger)'>Не совсем. </b>") + q.e; ex.classList.add("show");
      scoreEl.innerHTML = "Отвечено: <b>" + answered + "</b> из " + total + " · Верно: <b>" + correct + "</b>";
    });

  /* ---------- КАРТОЧКИ ---------- */
  function deckMarkup() {
    return '<div class="deck"><div class="deck-meta" id="deckMeta"></div>' +
      '<div class="fcard" id="fcard" tabindex="0" role="button" aria-label="Карточка — нажмите, чтобы перевернуть"><div class="fcard-inner">' +
      '<div class="fcard-face fcard-front"><span class="ftag">вопрос</span><div class="fq" id="fq"></div><span class="hint">нажмите, чтобы перевернуть</span></div>' +
      '<div class="fcard-face fcard-back"><span class="ftag">ответ</span><div class="fa" id="fa"></div><span class="hint">нажмите, чтобы вернуть</span></div></div></div>' +
      '<div class="deck-controls" id="deckControls"><button class="btn ghost" id="againBtn">↺ Повторить позже</button><button class="btn primary" id="knowBtn">✓ Знаю</button></div>' +
      '<div class="deck-done" id="deckDone"></div></div>';
  }
  function initDeck() {
    var fcard = document.getElementById("fcard"); if (!fcard || !C.flashcards) return;
    var D = C.flashcards, fq = document.getElementById("fq"), fa = document.getElementById("fa");
    var meta = document.getElementById("deckMeta"), controls = document.getElementById("deckControls"), done = document.getElementById("deckDone");
    var total = D.length, queue = [], known = 0;
    function reset() { queue = D.map(function (_, i) { return i; }); known = 0; }
    reset();
    function render() {
      if (queue.length === 0) { finish(); return; }
      fq.textContent = D[queue[0]].q; fa.textContent = D[queue[0]].a; fcard.classList.remove("flipped");
      meta.innerHTML = "Осталось: <b>" + queue.length + "</b> из " + total + " · выучено: <b>" + known + "</b>";
    }
    function finish() {
      fcard.style.display = "none"; controls.style.display = "none"; meta.style.display = "none"; done.classList.add("show");
      done.innerHTML = '<div class="big">🎉 Колода пройдена!</div><p style="color:var(--text-dim);font-size:14.5px;margin-bottom:16px">Вы прогнали все ' + total + ' карточек.</p><button class="btn primary" id="deckRestart">Пройти заново</button>';
      document.getElementById("deckRestart").addEventListener("click", function () { reset(); fcard.style.display = ""; controls.style.display = ""; meta.style.display = ""; done.classList.remove("show"); render(); });
    }
    fcard.addEventListener("click", function () { fcard.classList.toggle("flipped"); });
    fcard.addEventListener("keydown", function (e) { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); fcard.classList.toggle("flipped"); } });
    document.getElementById("knowBtn").addEventListener("click", function () { queue.shift(); known++; render(); });
    document.getElementById("againBtn").addEventListener("click", function () { if (queue.length > 1) queue.push(queue.shift()); render(); });
    render();
  }

  /* ---------- ЭКЗАМЕН ---------- */
  function examMarkup() {
    return '<div id="examStart"><div class="card" style="text-align:center;max-width:560px;margin:0 auto">' +
      '<h3 style="margin-bottom:8px">Готовы проверить себя?</h3><p style="color:var(--text-dim);font-size:14.5px;margin-bottom:18px">Неотвеченные вопросы засчитываются как неверные.</p>' +
      '<button class="btn primary" id="examBegin">Начать экзамен</button></div></div>' +
      '<div id="examBody" style="display:none"><div class="exam-bar"><span class="exam-timer" id="examTimer">⏱ <b>00:00</b></span>' +
      '<span class="exam-prog" id="examProg"></span><button class="btn primary" id="examSubmit">Завершить экзамен</button></div>' +
      '<div id="examResult"></div><div class="quiz" id="examQuestions"></div>' +
      '<div style="text-align:center;margin-top:22px"><button class="btn ghost" id="examRetake" style="display:none">Пересдать заново</button></div></div>';
  }
  function initExam() {
    var beginBtn = document.getElementById("examBegin"); if (!beginBtn || !C.exam) return;
    var E = C.exam, startEl = document.getElementById("examStart"), bodyEl = document.getElementById("examBody");
    var qEl = document.getElementById("examQuestions"), resEl = document.getElementById("examResult");
    var timerEl = document.getElementById("examTimer"), progEl = document.getElementById("examProg");
    var submitBtn = document.getElementById("examSubmit"), retakeBtn = document.getElementById("examRetake");
    var answers = {}, graded = false, t0 = 0, timer = null;
    function pad(n) { return (n < 10 ? "0" : "") + n; }
    function fmt(s) { return pad(Math.floor(s / 60)) + ":" + pad(s % 60); }
    function prog() { progEl.textContent = "отвечено " + Object.keys(answers).length + " / " + E.length; }
    function renderQ() {
      qEl.innerHTML = E.map(function (q, qi) {
        var opts = q.opts.map(function (o, oi) { return '<button class="exopt" data-q="' + qi + '" data-o="' + oi + '"><span class="mk">' + String.fromCharCode(65 + oi) + '</span><span>' + esc(o) + '</span></button>'; }).join("");
        var tag = q.hard ? ' <span class="pill danger" style="margin-left:8px">продвинутый</span>' : '';
        return '<div class="exq" data-qi="' + qi + '"><div class="exn">Вопрос ' + (qi + 1) + ' из ' + E.length + tag + '</div><div class="qq">' + esc(q.q) + '</div><div class="exopts">' + opts + '</div><div class="exex" id="exex' + qi + '"></div></div>';
      }).join("");
    }
    qEl.addEventListener("click", function (e) {
      if (graded) return; var b = e.target.closest(".exopt"); if (!b) return;
      var qi = +b.getAttribute("data-q"), oi = +b.getAttribute("data-o"); answers[qi] = oi;
      b.closest(".exq").querySelectorAll(".exopt").forEach(function (o) { o.classList.toggle("sel", +o.getAttribute("data-o") === oi); });
      prog();
    });
    function begin() {
      answers = {}; graded = false; startEl.style.display = "none"; bodyEl.style.display = "";
      resEl.innerHTML = ""; retakeBtn.style.display = "none"; submitBtn.disabled = false; renderQ(); prog();
      t0 = Date.now(); timer = setInterval(function () { timerEl.innerHTML = "⏱ <b>" + fmt(Math.floor((Date.now() - t0) / 1000)) + "</b>"; }, 1000);
      bodyEl.scrollIntoView({ behavior: "smooth", block: "start" });
    }
    function grade() {
      if (graded) return; graded = true; if (timer) { clearInterval(timer); timer = null; }
      var elapsed = Math.floor((Date.now() - t0) / 1000), correct = 0;
      E.forEach(function (q, qi) {
        var pick = answers[qi]; if (pick === q.a) correct++;
        var box = qEl.querySelector('.exq[data-qi="' + qi + '"]');
        box.querySelectorAll(".exopt").forEach(function (o) { var oi = +o.getAttribute("data-o"); o.disabled = true; o.classList.remove("sel"); if (oi === q.a) o.classList.add("correct"); else if (oi === pick) o.classList.add("wrongpick"); });
        if (pick !== q.a) { var ex = document.getElementById("exex" + qi); ex.innerHTML = (pick === undefined ? "<b style='color:var(--danger)'>Без ответа. </b>" : "<b style='color:var(--danger)'>Неверно. </b>") + q.e; ex.classList.add("show"); }
      });
      var pct = Math.round(correct / E.length * 100), pass = pct >= 70;
      resEl.innerHTML = '<div class="exam-result ' + (pass ? "pass" : "fail") + '"><div class="big">' + pct + '%</div><div class="badge2">' + (pass ? "✓ Сдано" : "✗ Не сдано") + '</div>' +
        '<div class="sub">Верно ' + correct + ' из ' + E.length + ' · время ' + fmt(elapsed) + (pass ? ' · отличный результат!' : ' · нужно 70% — перечитайте разбор ниже.') + '</div></div>';
      submitBtn.disabled = true; retakeBtn.style.display = ""; resEl.scrollIntoView({ behavior: "smooth", block: "center" });
    }
    beginBtn.addEventListener("click", begin);
    submitBtn.addEventListener("click", grade);
    retakeBtn.addEventListener("click", function () { startEl.style.display = ""; bodyEl.style.display = "none"; startEl.scrollIntoView({ behavior: "smooth", block: "center" }); });
  }

  function initTerminal(T) {
    var body = document.getElementById("termBody"); if (!T || !body) return;
    var input = document.getElementById("termInput"), ps1 = document.getElementById("termPs1");
    var missionsEl = document.getElementById("termMissions"), doneBox = document.getElementById("termDone"), quick = document.getElementById("termQuick");
    var missions = T.missions || [], done = {}, history = [], hi = 0, pending = null, defPrompt = T.prompt || "$";
    var cmds = {}; (T.commands || []).forEach(function (c) { cmds[c.name] = c; });

    function put(text, cls) { var d = document.createElement("div"); if (cls) d.className = cls; d.textContent = text; body.appendChild(d); body.scrollTop = body.scrollHeight; }
    function putHTML(h, cls) { var d = document.createElement("div"); if (cls) d.className = cls; d.innerHTML = h; body.appendChild(d); body.scrollTop = body.scrollHeight; }
    function renderM() {
      missionsEl.innerHTML = missions.map(function (m) { var d = done[m.id]; return '<li class="' + (d ? "done" : "") + '"><span class="box">' + (d ? "✓" : "") + '</span><span>' + m.text + '</span></li>'; }).join("");
      doneBox.classList.toggle("show", missions.length > 0 && missions.every(function (m) { return done[m.id]; }));
    }
    renderM();

    var ctx = {
      cfg: T, state: {}, helpText: T.help || "",
      print: put, printHTML: putHTML,
      out: function (t) { put(t, "out"); },
      note: function (t) { put("↳ " + t, "note"); },
      muted: function (t) { put(t, "muted"); },
      error: function (t) { put(t, "err"); },
      clear: function () { body.innerHTML = ""; },
      complete: function (id) { if (!done[id]) { done[id] = true; renderM(); } },
      ask: function (label, opts, cb) { pending = { cb: cb, label: label, mask: !!(opts && opts.mask) }; ps1.textContent = label; if (pending.mask) input.type = "password"; }
    };

    function run(raw) {
      putHTML('<span class="ps">' + esc(T.prompt || "$") + '</span> ' + esc(raw), "cmd-echo");
      var line = raw.trim(); if (line === "") return;
      var tk = line.split(/\s+/), name = tk[0];
      ctx.argsRaw = line.slice(name.length).trim();
      var c = cmds[name];
      if (c) { try { c.run(tk.slice(1), ctx); } catch (e) { ctx.error("ошибка: " + e.message); } }
      else if (name === "clear") { ctx.clear(); }
      else if (name === "help") { put(ctx.helpText, "out"); }
      else { ctx.error((T.notFound || "команда не найдена: ") + name); }
    }
    function submit() {
      var v = input.value; input.value = "";
      if (pending) {
        var p = pending; pending = null;
        putHTML('<span class="ps">' + esc(p.label) + '</span> ' + (p.mask ? "•".repeat(Math.min(v.length, 8) || 4) : esc(v)), "muted");
        ps1.textContent = defPrompt; input.type = "text";
        try { p.cb(v, ctx); } catch (e) { ctx.error("ошибка: " + e.message); }
        return;
      }
      if (v.trim() !== "") history.push(v); hi = history.length; run(v);
    }
    input.addEventListener("keydown", function (e) {
      if (e.key === "Enter") { e.preventDefault(); submit(); }
      else if (e.key === "ArrowUp") { if (history.length && hi > 0) { hi--; input.value = history[hi]; e.preventDefault(); } }
      else if (e.key === "ArrowDown") { if (hi < history.length - 1) { hi++; input.value = history[hi]; } else { hi = history.length; input.value = ""; } e.preventDefault(); }
    });
    body.addEventListener("click", function () { input.focus(); });

    if ((T.quick || []).length) quick.innerHTML = T.quick.map(function (q) { return '<button class="qc" data-cmd="' + esc(q) + '">' + esc(q) + '</button>'; }).join("");
    quick.addEventListener("click", function (e) { var b = e.target.closest(".qc"); if (!b) return; input.focus(); run(b.getAttribute("data-cmd")); });
    document.getElementById("termReset").addEventListener("click", function () {
      body.innerHTML = ""; done = {}; pending = null; input.type = "text"; ps1.textContent = defPrompt;
      Object.keys(ctx.state).forEach(function (k) { delete ctx.state[k]; });
      renderM(); if (T.onReset) T.onReset(ctx); if (T.greeting) put(T.greeting, "muted");
    });
    if (T.greeting) put(T.greeting, "muted");
  }

  /* ---------- ТЕМА / ПРОГРЕСС / НАВИГАЦИЯ ---------- */
  var sun = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
  var moon = '<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/>';
  function isDark() { var t = root.getAttribute("data-theme"); return t ? t === "dark" : window.matchMedia("(prefers-color-scheme: dark)").matches; }
  function syncIcon() { document.getElementById("themeIcon").innerHTML = isDark() ? sun : moon; }
  document.getElementById("themeBtn").addEventListener("click", function () { root.setAttribute("data-theme", isDark() ? "light" : "dark"); syncIcon(); });
  syncIcon();

  var progress = document.getElementById("progress");
  window.addEventListener("scroll", function () { var h = document.documentElement; progress.style.width = (h.scrollTop / (h.scrollHeight - h.clientHeight) * 100) + "%"; }, { passive: true });

  var links = Array.prototype.slice.call(document.querySelectorAll(".nav-links a")), secToLink = {};
  links.forEach(function (l) { (l.getAttribute("data-sec") || "").split(/\s+/).forEach(function (id) { if (id) secToLink[id] = l; }); });
  var obs = new IntersectionObserver(function (ents) {
    ents.forEach(function (en) { if (en.isIntersecting) { var a = secToLink[en.target.id]; if (a) { links.forEach(function (l) { l.classList.remove("active"); }); a.classList.add("active"); } } });
  }, { rootMargin: "-45% 0px -50% 0px" });
  document.querySelectorAll("main section").forEach(function (s) { obs.observe(s); });

  /* init interactive components */
  initSim(); initQuiz(); initDeck(); initExam(); initGlossary(); initTerminal(C.terminal);
})();
</script>

</body>
